<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root {
      --brand: #2f6f4f;
      --brand-light: #eaf3ee;
      --text: #1f2421;
      --muted: #6b7570;
      --border: #e2e6e3;
      --bg: #fafbfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      position: sticky;
      top: 0;
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      z-index: 10;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
      color: var(--brand);
    }
    .search-row {
      display: flex;
      gap: 8px;
    }
    #searchInput {
      flex: 1;
      padding: 12px 14px;
      font-size: 15px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
    }
    #searchInput:focus {
      border-color: var(--brand);
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
      gap: 8px;
    }
    .season-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .season-chip {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 12.5px;
      cursor: pointer;
      color: var(--text);
      white-space: nowrap;
    }
    .season-chip.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    #refreshBtn {
      border: none;
      background: none;
      color: var(--brand);
      cursor: pointer;
      font-size: 12px;
      text-decoration: underline;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }
    #emptyState {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-size: 14px;
    }
    #loading {
      padding: 8px 0;
    }
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .skeleton-card {
      height: 150px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.8) 50%, rgba(255,255,255,0) 100%),
        #eef1ef;
      background-size: 220px 100%, 100% 100%;
      background-repeat: no-repeat;
      animation: skeletonMove 1.05s linear infinite;
    }
    @keyframes skeletonMove {
      from { background-position: -220px 0, 0 0; }
      to { background-position: calc(100% + 220px) 0, 0 0; }
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: box-shadow 0.15s ease, transform 0.1s ease;
    }
    .card:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      transform: translateY(-1px);
    }
    .card-sheet-tag {
      display: inline-block;
      font-size: 11px;
      color: var(--brand);
      background: var(--brand-light);
      padding: 2px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 4px 0;
      line-height: 1.35;
    }
    .card-code {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }
    .swatch-chip {
      font-size: 11px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 6px;
      color: var(--muted);
    }
    .card-price {
      font-size: 13px;
      margin-top: 8px;
      color: var(--text);
    }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20,24,21,0.45);
      z-index: 100;
      padding: 20px;
      overflow-y: auto;
    }
    .overlay.open { display: block; }
    .modal {
      background: #fff;
      max-width: 720px;
      margin: 30px auto;
      border-radius: 14px;
      padding: 24px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      border: none;
      background: var(--bg);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      color: var(--muted);
    }
    .modal h2 {
      font-size: 19px;
      margin: 0 0 4px 0;
      padding-right: 40px;
    }
    .modal .modal-code {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .field-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    .field-table tr {
      border-top: 1px solid var(--border);
    }
    .field-table td {
      padding: 9px 6px;
      vertical-align: top;
    }
    .field-table td.k {
      width: 110px;
      color: var(--muted);
      white-space: nowrap;
    }
    .field-table td.v {
      white-space: pre-line;
      word-break: keep-all;
    }
    .variant-section {
      margin-top: 16px;
    }
    .variant-section h3 {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .variant-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12.5px;
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
    }
    .variant-row span {
      color: var(--muted);
    }
    .variant-row b { font-weight: 600; color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>📦 상품 스펙 검색</h1>
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="상품명, 품번, 소재, 컬러 등으로 검색... (예: 버킷햇, 나일론)" />
    </div>
    <div class="season-filters" id="seasonFilters"></div>
    <div class="meta-row">
      <span id="resultCount"></span>
      <span>
        <span id="fetchedAt"></span>
        <button id="refreshBtn" onclick="loadData(true)">새로고침</button>
      </span>
    </div>
  </div>
</header>

<main>
  <div id="loading" aria-label="상품 데이터 불러오는 중">
    <div class="skeleton-grid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </div>
  <div id="emptyState" style="display:none;">검색 결과가 없습니다.</div>
  <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
  let ALL_SHEETS = [];              // [{sheetName}]
  let ALL_PRODUCTS = [];            // 품번 기준 중복 제거된 상품 목록
  let CURRENT_RENDERED_PRODUCTS = [];
  let activeSeasonFilter = null;
  let searchTimer = null;
  let renderToken = 0;
  let isFreshDataApplied = false;
  let isRequesting = false;

  // 원본 전체 시트가 아닌 '중복 제거가 끝난 화면용 데이터'를 저장합니다.
  // 다음 접속부터 무거운 중복 제거 계산을 다시 하지 않아 훨씬 빨리 표시됩니다.
  const CACHE_KEY = 'whiteSandsProductSpecPreparedCache_v5';
  const RENDER_FIRST_BATCH = 45;
  const RENDER_BATCH = 90;

  function setRefreshState(isLoading) {
    isRequesting = isLoading;
    const btn = document.getElementById('refreshBtn');
    btn.disabled = isLoading;
    btn.textContent = isLoading ? '업데이트 중' : '새로고침';
    btn.style.opacity = isLoading ? '0.55' : '1';
    btn.style.cursor = isLoading ? 'default' : 'pointer';
  }

  function loadData(forceRefresh) {
    const hasProducts = ALL_PRODUCTS.length > 0;
    let cacheLoaded = false;

    // 저장된 '화면용 데이터'를 먼저 즉시 표시
    if (!forceRefresh && !hasProducts) {
      cacheLoaded = loadPreparedCache();
    }

    if (!cacheLoaded && !hasProducts) {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('grid').innerHTML = '';
      document.getElementById('emptyState').style.display = 'none';
    } else {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('fetchedAt').textContent =
        forceRefresh ? '새 데이터 불러오는 중...' : '최신 데이터 확인 중...';
    }

    if (isRequesting) return;
    setRefreshState(true);

    google.script.run
      .withSuccessHandler(onDataLoaded)
      .withFailureHandler(onDataError)
      // Code.gs가 forceRefresh 인수를 사용하면 서버 캐시를 우회할 수 있습니다.
      // 기존 함수가 인수를 사용하지 않아도 오류 없이 동작합니다.
      .getAllProductsData(Boolean(forceRefresh));
  }

  function loadPreparedCache() {
    try {
      const saved = localStorage.getItem(CACHE_KEY);
      if (!saved) return false;

      const cache = JSON.parse(saved);
      if (!cache || !Array.isArray(cache.products) || !Array.isArray(cache.sheets)) {
        return false;
      }

      ALL_SHEETS = cache.sheets;
      ALL_PRODUCTS = cache.products;
      ensurePreparedProducts(ALL_PRODUCTS);

      const cachedTime = cache.fetchedAt || cache.savedAt || Date.now();
      document.getElementById('fetchedAt').textContent =
        '저장 데이터: ' + new Date(cachedTime).toLocaleString('ko-KR');
      document.getElementById('loading').style.display = 'none';

      renderSeasonFilters();
      runSearch();
      return true;
    } catch (err) {
      try { localStorage.removeItem(CACHE_KEY); } catch (ignore) {}
      return false;
    }
  }

  function savePreparedCache(data) {
    try {
      const sheetNames = [];
      ALL_SHEETS.forEach(function (sheet) {
        if (sheet && sheet.sheetName && sheetNames.indexOf(sheet.sheetName) === -1) {
          sheetNames.push(sheet.sheetName);
        }
      });

      const snapshot = {
        version: 5,
        savedAt: Date.now(),
        fetchedAt: data.fetchedAt || Date.now(),
        sheets: sheetNames.map(function (sheetName) {
          return { sheetName: sheetName };
        }),
        products: ALL_PRODUCTS
      };

      localStorage.setItem(CACHE_KEY, JSON.stringify(snapshot));
    } catch (err) {
      // 브라우저 저장 공간이 부족해도 최신 데이터 표시는 정상적으로 유지됩니다.
    }
  }

  function onDataError(err) {
    setRefreshState(false);

    if (ALL_PRODUCTS.length > 0) {
      document.getElementById('fetchedAt').textContent =
        '최신 데이터 확인 실패 · 저장된 데이터 표시 중';
      return;
    }

    document.getElementById('loading').innerHTML =
      '<div style="text-align:center;color:var(--muted);padding:50px 20px;">' +
      '데이터를 불러오지 못했습니다: ' +
      escapeHtml(err && err.message ? err.message : err) +
      '</div>';
  }

  function onDataLoaded(data) {
    setRefreshState(false);
    isFreshDataApplied = true;
    applyFreshData(data);
  }

  function applyFreshData(data) {
    const sheets = data && Array.isArray(data.sheets) ? data.sheets : [];
    const nextProducts = buildUniqueProducts(sheets);

    ALL_SHEETS = sheets.map(function (sheet) {
      return { sheetName: sheet.sheetName };
    });
    ALL_PRODUCTS = nextProducts;

    const fetchedAt = data && data.fetchedAt ? new Date(data.fetchedAt) : new Date();
    document.getElementById('fetchedAt').textContent =
      '업데이트: ' + fetchedAt.toLocaleString('ko-KR');
    document.getElementById('loading').style.display = 'none';

    savePreparedCache(data || {});
    renderSeasonFilters();
    runSearch();
  }

  function normalizeProductCode(value) {
    return String(value || '')
      .trim()
      .toLowerCase()
      .replace(/\s+/g, '');
  }

  function normalizeProductName(value) {
    return String(value || '')
      .trim()
      .toLowerCase()
      .replace(/\s+/g, '');
  }

  function ensurePreparedProducts(products) {
    products.forEach(function (product) {
      product.sheetNames = Array.isArray(product.sheetNames)
        ? product.sheetNames
        : [product.sheetName].filter(Boolean);

      product.fields = product.fields || {};
      product.variants = Array.isArray(product.variants) ? product.variants : [];
      product.name = product.name ||
        findFieldValue(product.fields, ['제품명', '상품명', '품명']) ||
        '(이름 없음)';
      product.code = product.code ||
        findFieldValue(product.fields, ['품번', '제품코드', '상품코드']);
      product.price = product.price ||
        findFieldValue(product.fields, ['판매가']);

      if (!product.searchText) {
        product.searchText = makeSearchText(product);
      }
    });
  }

  function makeSearchText(product) {
    return [
      Object.values(product.fields || {}).join(' '),
      (product.variants || []).map(function (variant) {
        return Object.values(variant || {}).join(' ');
      }).join(' '),
      (product.sheetNames || []).join(' '),
      product.name || '',
      product.code || ''
    ].join(' ').toLowerCase();
  }

  function buildUniqueProducts(sheets) {
    const productMap = new Map();

    sheets.forEach(function (sheet) {
      (sheet.products || []).forEach(function (p) {
        const fields = p.fields || {};
        const variants = Array.isArray(p.variants) ? p.variants : [];
        const name = findFieldValue(fields, ['제품명', '상품명', '품명']) || '(이름 없음)';
        const code = findFieldValue(fields, ['품번', '제품코드', '상품코드']);

        const uniqueKey = code
          ? 'code:' + normalizeProductCode(code)
          : 'name:' + sheet.sheetName + ':' + normalizeProductName(name);

        if (!productMap.has(uniqueKey)) {
          productMap.set(uniqueKey, {
            sheetName: sheet.sheetName,
            sheetNames: [sheet.sheetName],
            headers: sheet.headers || [],
            fields: Object.assign({}, fields),
            variants: variants.slice(),
            id: uniqueKey,
            name: name,
            code: code,
            price: findFieldValue(fields, ['판매가']),
            searchParts: [Object.values(fields).join(' ')]
          });
          return;
        }

        const existing = productMap.get(uniqueKey);

        if (existing.sheetNames.indexOf(sheet.sheetName) === -1) {
          existing.sheetNames.push(sheet.sheetName);
        }

        existing.searchParts.push(Object.values(fields).join(' '));

        Object.keys(fields).forEach(function (key) {
          if (!existing.fields[key] && fields[key]) {
            existing.fields[key] = fields[key];
          }
        });

        variants.forEach(function (variant) {
          const variantKey = JSON.stringify(variant);
          const alreadyExists = existing.variants.some(function (savedVariant) {
            return JSON.stringify(savedVariant) === variantKey;
          });
          if (!alreadyExists) existing.variants.push(variant);
        });
      });
    });

    return Array.from(productMap.values()).map(function (product) {
      product.searchText = [
        product.searchParts.join(' '),
        product.variants.map(function (variant) {
          return Object.values(variant || {}).join(' ');
        }).join(' '),
        product.sheetNames.join(' ')
      ].join(' ').toLowerCase();

      delete product.searchParts;
      return product;
    });
  }

  function renderSeasonFilters() {
    const wrap = document.getElementById('seasonFilters');
    const counts = Object.create(null);

    ALL_PRODUCTS.forEach(function (product) {
      (product.sheetNames || []).forEach(function (sheetName) {
        counts[sheetName] = (counts[sheetName] || 0) + 1;
      });
    });

    let html = '<button type="button" class="season-chip' +
      (activeSeasonFilter === null ? ' active' : '') +
      '" data-season="">전체 (' + ALL_PRODUCTS.length + ')</button>';

    ALL_SHEETS.forEach(function (sheet) {
      const sheetName = sheet.sheetName;
      html += '<button type="button" class="season-chip' +
        (activeSeasonFilter === sheetName ? ' active' : '') +
        '" data-season="' + escapeHtml(sheetName) + '">' +
        escapeHtml(sheetName) + ' (' + (counts[sheetName] || 0) + ')</button>';
    });

    wrap.innerHTML = html;
  }

  function findFieldValue(fields, keywords) {
    const keys = Object.keys(fields || {});
    for (let i = 0; i < keys.length; i++) {
      for (let k = 0; k < keywords.length; k++) {
        if (keys[i].indexOf(keywords[k]) !== -1 && fields[keys[i]]) {
          return fields[keys[i]];
        }
      }
    }
    return '';
  }

  function cardHtml(p, index) {
    return '<div class="card" data-product-index="' + index + '">' +
      '<span class="card-sheet-tag">' + escapeHtml(p.sheetName) + '</span>' +
      '<div class="card-name">' + escapeHtml(p.name) + '</div>' +
      (p.code ? '<div class="card-code">' + escapeHtml(p.code) + '</div>' : '') +
      (p.price ? '<div class="card-price">' + escapeHtml(p.price) + '</div>' : '') +
      '</div>';
  }

  function scheduleRender(callback) {
    if ('requestIdleCallback' in window) {
      requestIdleCallback(callback, { timeout: 100 });
    } else {
      setTimeout(callback, 0);
    }
  }

  function renderGrid(products) {
    const grid = document.getElementById('grid');
    CURRENT_RENDERED_PRODUCTS = products;
    document.getElementById('resultCount').textContent = products.length + '개 상품';

    renderToken += 1;
    const currentToken = renderToken;

    if (products.length === 0) {
      grid.innerHTML = '';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';

    // 먼저 화면에 보일 카드만 즉시 렌더링하고 나머지는 브라우저 유휴 시간에 이어서 처리
    const firstEnd = Math.min(RENDER_FIRST_BATCH, products.length);
    let firstHtml = '';
    for (let i = 0; i < firstEnd; i++) {
      firstHtml += cardHtml(products[i], i);
    }
    grid.innerHTML = firstHtml;

    let cursor = firstEnd;

    function appendNextBatch() {
      if (currentToken !== renderToken || cursor >= products.length) return;

      const end = Math.min(cursor + RENDER_BATCH, products.length);
      let html = '';
      for (let i = cursor; i < end; i++) {
        html += cardHtml(products[i], i);
      }

      grid.insertAdjacentHTML('beforeend', html);
      cursor = end;

      if (cursor < products.length) {
        scheduleRender(appendNextBatch);
      }
    }

    if (cursor < products.length) {
      scheduleRender(appendNextBatch);
    }
  }

  function normalizeFieldName(fieldName) {
    return String(fieldName || '')
      .toLowerCase()
      .replace(/[^0-9a-z가-힣]/gi, '');
  }

  function shouldHideModalField(fieldName) {
    const normalized = normalizeFieldName(fieldName);
    const exactHiddenFields = ['no', '생산처', '누끼'];

    if (exactHiddenFields.indexOf(normalized) !== -1) return true;

    const partialHiddenFields = [
      '입고예정일',
      '사이트등록여부',
      '룩북2차촬영913성인키즈'
    ];

    if (partialHiddenFields.some(function (field) {
      return normalized.indexOf(field) !== -1;
    })) return true;

    if (normalized.indexOf('이미지') === 0 || normalized.indexOf('image') === 0) {
      return true;
    }

    return false;
  }

  function openModal(p) {
    const name = p.name ||
      findFieldValue(p.fields, ['제품명', '상품명', '품명']) ||
      '(이름 없음)';
    const code = p.code ||
      findFieldValue(p.fields, ['품번', '제품코드', '상품코드']);

    let rows = '';
    Object.keys(p.fields || {}).forEach(function (k) {
      const v = p.fields[k];
      if (!v) return;
      if (['제품명', '상품명', '품명'].some(function (kw) {
        return k.indexOf(kw) !== -1;
      })) return;
      if (shouldHideModalField(k)) return;

      rows += '<tr><td class="k">' + escapeHtml(k) +
        '</td><td class="v">' + escapeHtml(v) + '</td></tr>';
    });

    document.getElementById('modal').innerHTML =
      '<button class="modal-close" onclick="closeModal()">✕</button>' +
      '<span class="card-sheet-tag">' + escapeHtml(p.sheetName) + '</span>' +
      '<h2>' + escapeHtml(name) + '</h2>' +
      (code ? '<div class="modal-code">품번: ' + escapeHtml(code) + '</div>' : '') +
      '<table class="field-table">' + rows + '</table>';

    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function closeModalOnOverlay(e) {
    if (e.target.id === 'overlay') closeModal();
  }

  function escapeHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function runSearch() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let list = ALL_PRODUCTS;

    if (activeSeasonFilter) {
      list = list.filter(function (p) {
        return (p.sheetNames || []).indexOf(activeSeasonFilter) !== -1;
      });
    }

    if (q) {
      list = list.filter(function (p) {
        return (p.searchText || '').indexOf(q) !== -1;
      });
    }

    renderGrid(list);
  }

  document.getElementById('grid').addEventListener('click', function (event) {
    const card = event.target.closest('.card');
    if (!card) return;

    const index = Number(card.getAttribute('data-product-index'));
    const product = CURRENT_RENDERED_PRODUCTS[index];
    if (product) openModal(product);
  });

  document.getElementById('seasonFilters').addEventListener('click', function (event) {
    const chip = event.target.closest('.season-chip');
    if (!chip) return;

    const season = chip.getAttribute('data-season');
    activeSeasonFilter = season || null;
    renderSeasonFilters();
    runSearch();
  });

  document.getElementById('searchInput').addEventListener('input', function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(runSearch, 90);
  });

  loadData(false);
</script>
</body>
</html>
