<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>주문 조회 · 출고기간 필터</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<style>
  :root{
    --ink:#1b2430;
    --ink-soft:#5b6674;
    --line:#e2e6eb;
    --bg:#f6f7f9;
    --panel:#ffffff;
    --accent:#2f5d50;
    --accent-soft:#eaf1ee;
    --danger:#b3452c;
    --radius:10px;
    font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    width:100%;
    max-width:100%;
    overflow-x:hidden;
  }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding:28px clamp(16px, 2vw, 32px) 80px;
  }
  /* 데스크톱 화면을 넓게 사용하도록 기존 960px 제한을 완화 */
  .wrap{
    width:100%;
    max-width:1600px;
    margin:0 auto;
  }
  header{margin-bottom:28px;}
  header .eyebrow{
    font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:6px;
  }
  h1{font-size:26px;margin:0 0 4px;font-weight:800;}
  header p{margin:0;color:var(--ink-soft);font-size:14px;}

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:20px;
  }

  .latest-upload{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
    margin:-10px 0 14px;
    padding:11px 14px;
    border:1px solid #cdded7;
    border-radius:9px;
    background:var(--accent-soft);
    color:var(--accent);
    font-size:13px;
  }
  .latest-upload-main{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }
  .latest-upload-label{font-weight:700;white-space:nowrap;}
  .latest-upload-file{
    color:var(--ink);
    font-weight:700;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    max-width:min(720px, 70vw);
  }
  .latest-upload-meta{color:var(--ink-soft);white-space:nowrap;}
  .latest-upload.error{
    background:#fdf5f2;
    border-color:#e7c9bd;
    color:var(--danger);
  }

  .top-header{
    display:grid;
    grid-template-columns:minmax(250px, auto) minmax(560px, 1fr) auto;
    align-items:center;
    gap:24px;
    margin-bottom:18px;
  }
  .header-title{min-width:250px;}
  .header-filter{
    min-width:0;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:10px;
    background:var(--panel);
  }
  .header-filter-row{
    display:flex;
    align-items:flex-end;
    gap:8px;
    min-width:0;
  }
  .header-filter-field{
    display:flex;
    flex-direction:column;
    gap:5px;
    min-width:0;
  }
  .header-filter-field.date-range-field{flex:0 0 330px;}
  .header-filter-field.mall-field{flex:1 1 210px;}
  .date-range-inputs{
    display:grid;
    grid-template-columns:minmax(135px,1fr) auto minmax(135px,1fr);
    align-items:center;
    gap:6px;
  }
  .date-range-inputs .separator{
    color:var(--ink-soft);
    font-size:13px;
    text-align:center;
  }
  .header-filter-field label{
    color:var(--ink-soft);
    font-size:11px;
    font-weight:700;
  }
  .header-filter input[type="date"],
  .header-filter select{
    width:100%;
    height:39px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    background:#fff;
    color:var(--ink);
    font-size:13px;
    outline:none;
  }
  .header-filter input[type="date"]:focus,
  .header-filter select:focus{border-color:var(--accent);}
  .header-filter input:disabled,
  .header-filter select:disabled{background:#f1f3f5;color:#8a949f;}
  .header-filter-actions{
    display:flex;
    align-items:center;
    gap:6px;
    flex:0 0 auto;
  }
  .header-filter-actions button{
    min-height:39px;
    padding:8px 12px;
    font-size:13px;
    white-space:nowrap;
  }
  .filter-meta{
    min-height:16px;
    margin-top:6px;
    color:var(--ink-soft);
    font-size:11px;
    line-height:1.35;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .filter-meta.error{color:var(--danger);}
  .user-area{display:flex;align-items:center;gap:10px;justify-self:end;}
  @media (max-width:1180px){
    .top-header{grid-template-columns:1fr auto;}
    .header-filter{grid-column:1 / -1;grid-row:2;}
  }
  @media (max-width:720px){
    .top-header{display:flex;flex-direction:column;align-items:stretch;gap:12px;}
    .user-area{justify-content:flex-end;}
    .header-filter-row{align-items:stretch;flex-wrap:wrap;}
    .header-filter-field.date-range-field,
    .header-filter-field.mall-field{flex:1 1 100%;}
    .date-range-inputs{grid-template-columns:1fr auto 1fr;}
    .header-filter-actions{flex:1 1 100%;}
    .header-filter-actions button{flex:1 1 auto;}
  }

  .search-row{display:flex;gap:10px;flex-wrap:wrap;}
  .search-row input[type="text"]{
    flex:1 1 260px;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:border-color .15s;
  }
  .search-row input[type="text"]:focus{border-color:var(--accent);}

  button{
    padding:12px 20px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:opacity .15s;
  }
  button:hover{opacity:.9;}
  button:disabled{opacity:.5;cursor:default;}
  button.ghost{
    background:transparent;
    color:var(--accent);
    border:1px solid var(--line);
  }

  .meta{
    display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
    margin:14px 0 8px;font-size:13px;color:var(--ink-soft);
  }
  .meta .count strong{color:var(--ink);}
  .selection-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .selection-tools .hint{font-size:12px;color:var(--ink-soft);}
  button.compact{padding:8px 12px;font-size:13px;}
  .select-cell{width:42px;min-width:42px;text-align:center!important;}
  .row-check,#selectAllRows{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);}
  tbody tr.selected{background:var(--accent-soft);}
  tbody tr.selected:hover{background:var(--accent-soft);}
  .notice{
    display:none;margin:0 0 10px;padding:10px 12px;border-radius:8px;
    background:var(--accent-soft);color:var(--accent);font-size:13px;border:1px solid #cdded7;
  }
  .notice.error{background:#fdf5f2;color:var(--danger);border-color:#e7c9bd;}

  table{
    width:100%;
    min-width:1320px;
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  thead th{
    background:var(--accent-soft);
    color:var(--accent);
    text-align:left;
    font-size:12px;
    letter-spacing:.03em;
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody td{
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    font-size:14px;
    vertical-align:top;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#fafbfc;}

  .state{
    padding:40px 20px;
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    background:var(--panel);
    border:1px dashed var(--line);
    border-radius:var(--radius);
  }
  .state.error{color:var(--danger);border-color:#e7c9bd;background:#fdf5f2;}

  .table-scroll{
    width:100%;
    overflow-x:auto;
  }

  footer{margin-top:30px;font-size:12px;color:var(--ink-soft);text-align:center;}

  /* 업로드 패널 */
  #uploadPanel{display:none;}
  .drop{
    border:2px dashed var(--line); border-radius:var(--radius);
    padding:36px 20px; text-align:center; color:var(--ink-soft);
    transition:border-color .15s, background .15s; cursor:pointer;
  }
  .drop.dragover{border-color:var(--accent);background:var(--accent-soft);}
  .drop input{display:none;}
  .drop .filename{margin-top:10px;font-weight:600;color:var(--ink);}
  .options{display:flex;align-items:center;gap:8px;margin-top:16px;font-size:14px;color:var(--ink-soft);}
  .options input{width:16px;height:16px;}
  .actions{display:flex;gap:10px;margin-top:18px;}
  .log{
    margin-top:16px; background:#0f1a17; color:#c9e6da; font-size:13px;
    border-radius:8px; padding:14px; max-height:260px; overflow-y:auto;
    white-space:pre-wrap; font-family:"SFMono-Regular",Menlo,Consolas,monospace; display:none;
  }
  .progress{height:8px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:14px;display:none;}
  .progress .bar{height:100%;width:0%;background:var(--accent);transition:width .2s;}

  .upload-validation-error{
    display:none;
    margin-top:14px;
    padding:14px;
    border-radius:10px;
    border:1px solid #e7c9bd;
    background:#fdf5f2;
    color:var(--danger);
  }
  .upload-validation-error h3{
    margin:0 0 8px;
    font-size:14px;
  }
  .upload-validation-error p{
    margin:0 0 10px;
    font-size:13px;
    line-height:1.45;
  }
  .upload-validation-error .error-row-list{
    max-height:180px;
    overflow:auto;
    padding:10px;
    border-radius:8px;
    background:#fff;
    border:1px solid #efd7cf;
    font-size:12px;
    line-height:1.55;
    white-space:pre-wrap;
    word-break:break-word;
    font-family:"SFMono-Regular",Menlo,Consolas,monospace;
  }

</style>
</head>
<body>
<div class="wrap">
  <header class="top-header">
    <div class="header-title">
      <div class="eyebrow">Internal Tool</div>
      <h1>주문 조회</h1>
      <p>검색어를 입력하면 일치하는 주문 데이터를 보여줍니다.</p>
    </div>

    <div class="header-filter" aria-label="주문 상세 필터">
      <div class="header-filter-row">
        <div class="header-filter-field date-range-field">
          <label>출고일</label>
          <div class="date-range-inputs">
            <input id="filterStartDate" type="date" aria-label="출고 시작일 선택" disabled />
            <span class="separator">~</span>
            <input id="filterEndDate" type="date" aria-label="출고 종료일 선택" disabled />
          </div>
        </div>

        <div class="header-filter-field mall-field">
          <label for="filterMall">쇼핑몰</label>
          <select id="filterMall" aria-label="쇼핑몰" disabled>
            <option value="">전체 쇼핑몰</option>
          </select>
        </div>

        <div class="header-filter-actions">
          <button id="applyFilterBtn" type="button">필터 적용</button>
          <button id="resetFilterBtn" class="ghost" type="button">초기화</button>
          <button id="refreshFilterOptionsBtn" class="ghost" type="button" title="필터 조건 새로고침" aria-label="필터 조건 새로고침">↻</button>
        </div>
      </div>
      <div id="filterMeta" class="filter-meta" role="status" aria-live="polite"></div>
    </div>

    <div id="userBar" class="user-area"></div>
  </header>

  <div id="latestUpload" class="latest-upload" role="status" aria-live="polite">
    <div class="latest-upload-main">
      <span class="latest-upload-label">최근 업로드</span>
      <span id="latestUploadFile" class="latest-upload-file">확인 중...</span>
    </div>
    <span id="latestUploadMeta" class="latest-upload-meta"></span>
  </div>

  <div class="panel">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="예: 주문번호, 수령인, 운송장번호, 연락처 등으로 검색" />
      <button id="searchBtn">조회</button>
      <button id="toggleUploadBtn" class="ghost" type="button">데이터 업로드</button>
    </div>
  </div>

  <!-- 업로드 패널 (버튼 클릭 시 노출) -->
  <div class="panel" id="uploadPanel">
    <h2 style="font-size:16px;margin:0 0 4px;">주문 데이터 업로드</h2>
    <p style="margin:0 0 16px;color:var(--ink-soft);font-size:13px;">발주서 형식의 엑셀 파일(.xlsx)을 업로드하면 DB에 저장됩니다. 1행은 머리글로 인식하고 실제 데이터는 2행부터 검사합니다.</p>

    <div class="drop" id="dropZone">
      <div>엑셀 파일(.xlsx)을 이곳에 드래그하거나 클릭해서 선택하세요</div>
      <div class="filename" id="fileName"></div>
      <input type="file" id="fileInput" accept=".xlsx,.xls" />
    </div>

    <div class="options">
      <input type="checkbox" id="replaceMode" />
      <label for="replaceMode">업로드 전 기존 데이터 전체 삭제 후 새로 등록 (전체 교체)</label>
    </div>

    <div class="actions">
      <button id="uploadBtn" disabled>업로드 시작</button>
    </div>

    <div class="progress" id="progressWrap"><div class="bar" id="progressBar"></div></div>
    <div class="log" id="log"></div>
    <div id="uploadValidationError" class="upload-validation-error" role="alert"></div>
  </div>

  <div id="metaRow" class="meta" style="display:none;">
    <div class="count">
      검색 결과 <strong id="resultCount">0</strong>건 <span id="resultLimitNote"></span> · 선택 <strong id="selectedCount">0</strong>건
    </div>
    <div class="selection-tools">
      <span class="hint">체크한 행은 Ctrl/Cmd + C로 원본 전체 행 복사</span>
      <button id="copySelectedBtn" class="ghost compact" type="button" disabled>원본 전체 행 복사</button>
      <button id="downloadSelectedBtn" class="ghost compact" type="button" disabled>선택 행 엑셀 다운로드</button>
      <button id="downloadFilteredBtn" class="ghost compact" type="button" disabled title="현재 조회 조건에 맞는 전체 결과를 다운로드합니다. 화면 표시 200건 제한과 무관합니다.">전체 결과 엑셀 다운로드</button>
    </div>
  </div>

  <div id="actionNotice" class="notice" role="status" aria-live="polite"></div>

  <div id="resultArea">
    <div class="state">검색어를 입력하고 조회 버튼을 눌러주세요.</div>
  </div>

  <footer>Powered by Supabase</footer>
</div>

<script>
/* =========================================================
   CONFIG — SUPABASE_URL / KEY는 config.js에서 관리합니다.
   ========================================================= */
const TABLE_NAME = "orders";
const BATCH_TABLE_NAME = "import_batches";
const FILTER_OPTIONS_RPC = "get_order_filter_options";
const DOWNLOAD_PAGE_SIZE = 1000;

// 검색 대상 컬럼: B 주문번호(사방넷), C 주문번호(쇼핑몰), E 수령인,
// G 운송장번호, H 받는분연락처, Z/AA 주문자연락처
const SEARCH_COLUMNS = [
  "order_no_sabangnet",
  "order_no_mall",
  "receiver_name",
  "tracking_no",
  "receiver_phone",
  "orderer_phone1",
  "orderer_phone2",
];

// 전화번호 형식 차이를 보완해서 추가 검색할 컬럼
const PHONE_SEARCH_COLUMNS = [
  "receiver_phone",
  "orderer_phone1",
  "orderer_phone2",
];

// 결과 테이블에 보여줄 컬럼: A B C D E F G H L M N T V
const DISPLAY_COLUMNS = [
  "shipped_date",
  "order_no_sabangnet",
  "order_no_mall",
  "mall",
  "receiver_name",
  "courier",
  "tracking_no",
  "receiver_phone",
  "product_name",
  "quantity",
  "payment_amount",
  "product_color_code",
  "option_collected",
];

// 결과 테이블 헤더에 보여줄 한글 라벨
const LABELS = {
  shipped_date: "출고일",
  order_no_sabangnet: "주문번호(사방넷)",
  order_no_mall: "주문번호(쇼핑몰)",
  mall: "쇼핑몰",
  receiver_name: "수령인",
  courier: "택배사",
  tracking_no: "운송장번호",
  receiver_phone: "받는분연락처",
  product_name: "상품명",
  quantity: "수량",
  payment_amount: "결제금액",
  product_color_code: "상품컬러코드",
  option_collected: "옵션(수집)",
};

// 한 번에 가져올 최대 결과 수
const MAX_RESULTS = 200;

// 엑셀 헤더 텍스트 -> DB 컬럼명 매핑 (업로드용)
// 실제 파일마다 헤더 표기가 조금씩 다를 수 있어 여러 변형을 함께 매핑해둡니다.
const HEADER_MAP = {
  "출고일": "shipped_date",
  "주문번호(사방넷)": "order_no_sabangnet",
  "주문번호(쇼핑몰)": "order_no_mall",
  "쇼핑몰": "mall",
  "수령인": "receiver_name",
  "택배사": "courier",
  "운송장번호": "tracking_no",
  "받는분연락처": "receiver_phone",
  "받는분기타연락처": "receiver_phone2",
  "주소": "address",
  "배송메세지": "delivery_message",
  "상품명": "product_name",
  "수량": "quantity",
  "결제금액": "payment_amount",
  "큐텐(한글상품명)": "product_name_qoo10",
  "바코드": "barcode",
  "큐텐바코드": "qoo10_barcode",
  "상품코드": "product_code",
  "모델NO": "model_no",
  "쇼핑몰(참고용)": "mall_ref",
  "상품컬러코드": "product_color_code",
  "상품명(수집)": "product_name_collected",
  "옵션(수집)": "option_collected",
  "주문자명": "orderer_name",
  "구분": "category",
  "주문일시": "order_datetime",
  "주문일시(YYYY-MM-DD HH:MM)": "order_datetime",
  "주문자 연락처(1)": "orderer_phone1",
  "주문자 연락처(2)": "orderer_phone2",
  "주문자전화번호1": "orderer_phone1",
  "주문자전화번호2": "orderer_phone2",
  "미출고": "not_shipped",
};
const NUMERIC_KEYS = new Set(["quantity", "payment_amount"]);
const SHEET_NAME = "발주서";
const BATCH_SIZE = 200;
/* ========================================================= */

let appInitialized = false;

function renderSignedInUser(session){
  const container = document.getElementById("userBar");
  if(!container) return;

  const email = session?.user?.email || "로그인 사용자";
  container.innerHTML = `
    <span style="font-size:13px;color:#5b6674;">${escapeHtml(email)}</span>
    <button type="button" id="logoutBtn" class="ghost compact">로그아웃</button>
  `;

  document.getElementById("logoutBtn")?.addEventListener("click", async () => {
    const button = document.getElementById("logoutBtn");
    if(button) button.disabled = true;

    try{
      await supabaseClient.auth.signOut();
    }finally{
      window.location.replace("login.html");
    }
  }, { once:true });
}

async function initializeApp(){
  if(appInitialized) return;
  appInitialized = true;

  try{
    const { data, error } = await supabaseClient.auth.getSession();
    if(error) throw error;

    const session = data?.session;
    if(!session){
      window.location.replace("login.html");
      return;
    }

    renderSignedInUser(session);
    await Promise.all([
      loadLatestUpload(),
      loadFilterOptions(),
    ]);
  }catch(err){
    console.error("초기화 오류:", err);
    const latest = document.getElementById("latestUpload");
    const latestFile = document.getElementById("latestUploadFile");
    const latestMeta = document.getElementById("latestUploadMeta");

    latest?.classList.add("error");
    if(latestFile) latestFile.textContent = "페이지 초기화 중 오류가 발생했습니다.";
    if(latestMeta) latestMeta.textContent = "새로고침 대신 다시 로그인해 주세요.";
  }
}

function formatUploadDate(value){
  if(!value) return "";
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return "";

  return new Intl.DateTimeFormat("ko-KR", {
    timeZone: "Asia/Seoul",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
  }).format(date);
}

let filterMallOptions = [];

function setFilterMeta(message, isError=false){
  filterMeta.textContent = message || "";
  filterMeta.classList.toggle("error", isError);
}

function formatCount(value){
  const count = Number(value);
  return Number.isFinite(count) ? count.toLocaleString("ko-KR") : "0";
}

function replaceSelectOptions(select, placeholder, options, formatter){
  const current = select.value;
  select.replaceChildren(new Option(placeholder, ""));
  options.forEach(item => select.add(new Option(formatter(item), item.value)));
  if(options.some(item => String(item.value) === current)) select.value = current;
}

function populateDatePicker(){
  const dates = filterDateOptions
    .map(item => item.date)
    .filter(Boolean)
    .sort();

  const disabled = dates.length === 0;
  [filterStartDate, filterEndDate].forEach(input => {
    input.disabled = disabled;
    if(dates.length){
      input.min = dates[0];
      input.max = dates[dates.length - 1];
    }else{
      input.value = "";
      input.removeAttribute("min");
      input.removeAttribute("max");
    }
  });
}

function populateMallOptions(){
  const malls = filterMallOptions
    .slice()
    .sort((a, b) => a.mall.localeCompare(b.mall, "ko-KR", { numeric:true, sensitivity:"base" }))
    .map(item => ({ value:item.mall, count:item.row_count }));

  replaceSelectOptions(
    filterMall,
    "전체 쇼핑몰",
    malls,
    item => `${item.value} · ${formatCount(item.count)}건`
  );
  filterMall.disabled = malls.length === 0;
}

async function loadFilterOptions(){
  [filterStartDate, filterEndDate, filterMall].forEach(el => el.disabled = true);
  refreshFilterOptionsBtn.disabled = true;
  downloadFilteredBtn.disabled = true;
  setFilterMeta("필터 조건을 불러오는 중입니다.");

  try{
    const { data, error } = await supabaseClient.rpc(FILTER_OPTIONS_RPC);
    if(error) throw error;

    filterDateOptions = (data || [])
      .filter(item => item.option_type === "date" && /^\d{4}-\d{2}-\d{2}$/.test(String(item.option_value || "")))
      .map(item => ({ date:String(item.option_value), row_count:Number(item.row_count || 0) }));

    filterMallOptions = (data || [])
      .filter(item => item.option_type === "mall" && String(item.option_value || "").trim())
      .map(item => ({ mall:String(item.option_value).trim(), row_count:Number(item.row_count || 0) }));

    populateDatePicker();
    populateMallOptions();
    setFilterMeta(`출고 기간과 쇼핑몰을 선택해 조회할 수 있습니다.`);

  }finally{
    refreshFilterOptionsBtn.disabled = false;
  }
}

function getFilterCriteria(keyword=""){
  return {
    keyword: String(keyword || "").trim(),
    startDate: filterStartDate.value,
    endDate: filterEndDate.value,
    mall: filterMall.value,
  };
}

function hasAnyCriteria(criteria){
  return Boolean(criteria.keyword || criteria.startDate || criteria.endDate || criteria.mall);
}

function getDateRange(criteria){
  let start = criteria.startDate || "";
  let end = criteria.endDate || "";
  if(start && end && start > end){
    [start, end] = [end, start];
  }
  return { start, end };
}

function applyCriteriaToQuery(query, criteria){
  const range = getDateRange(criteria);
  if(range.start){
    query = query.gte("ship_date", range.start);
  }
  if(range.end){
    query = query.lte("ship_date", range.end);
  }
  if(criteria.mall){
    query = query.eq("mall", criteria.mall);
  }
  if(criteria.keyword){
    const orFilter = buildKeywordOrFilter(criteria.keyword);
    if(orFilter) query = query.or(orFilter);
  }
  return query;
}

function formatKoreanDate(dateValue){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(String(dateValue || ""))) return "";
  const [year, month, day] = dateValue.split("-").map(Number);
  return `${year}년 ${month}월 ${day}일`;
}

function describeCriteria(criteria){
  const parts = [];
  const range = getDateRange(criteria);
  if(range.start && range.end){
    parts.push(
      range.start === range.end
        ? formatKoreanDate(range.start)
        : `${formatKoreanDate(range.start)} ~ ${formatKoreanDate(range.end)}`
    );
  }else if(range.start){
    parts.push(`${formatKoreanDate(range.start)} 이후`);
  }else if(range.end){
    parts.push(`${formatKoreanDate(range.end)} 이전`);
  }
  if(criteria.mall) parts.push(`쇼핑몰 ${criteria.mall}`);
  if(criteria.keyword) parts.push(`검색어 “${criteria.keyword}”`);
  return parts.join(" · ") || "전체 데이터";
}

async function fetchOriginalRowsByCriteria(criteria){
  const rows = [];
  let from = 0;

  while(true){
    const to = from + DOWNLOAD_PAGE_SIZE - 1;
    let query = supabaseClient
      .from(TABLE_NAME)
      .select("id,batch_id,raw_data,ship_date,mall")
      .order("id", { ascending:true })
      .range(from, to);

    query = applyCriteriaToQuery(query, criteria);
    const { data, error } = await query;
    if(error) throw error;

    const page = data || [];
    rows.push(...page);
    setFilterMeta(`${describeCriteria(criteria)} 데이터 불러오는 중 · ${rows.length.toLocaleString("ko-KR")}건`);

    if(page.length < DOWNLOAD_PAGE_SIZE) break;
    from += DOWNLOAD_PAGE_SIZE;
  }

  return rows;
}

function makeFilteredDownloadFilename(criteria){
  const parts = [];
  if(criteria.startDate) parts.push(criteria.startDate.replaceAll("-", ""));
  if(criteria.endDate && criteria.endDate !== criteria.startDate) parts.push(criteria.endDate.replaceAll("-", ""));
  if(criteria.mall) parts.push(criteria.mall);
  if(criteria.keyword) parts.push(criteria.keyword);

  const now = new Date();
  const stamp = [
    now.getFullYear(),
    String(now.getMonth() + 1).padStart(2, "0"),
    String(now.getDate()).padStart(2, "0"),
    "_",
    String(now.getHours()).padStart(2, "0"),
    String(now.getMinutes()).padStart(2, "0"),
    String(now.getSeconds()).padStart(2, "0"),
  ].join("");

  const condition = parts.length ? parts.join("_") : "전체";
  return `주문조회_전체결과_${condition}_${stamp}.xlsx`.replace(/[\\/:*?"<>|]/g, "_");
}

async function downloadFilteredOriginalRows(){
  if(!activeCriteria || activeTotalCount <= 0) return;

  downloadFilteredBtn.disabled = true;
  applyFilterBtn.disabled = true;
  searchBtn.disabled = true;
  downloadFilteredBtn.textContent = "전체 결과 준비 중...";

  try{
    const rows = await fetchOriginalRowsByCriteria(activeCriteria);
    if(!rows.length) throw new Error("조건에 맞는 데이터가 없습니다.");

    const batchMap = await fetchBatchInfo(rows);
    const { headers, values } = buildOriginalMatrix(rows, batchMap);
    if(!headers.length) throw new Error("원본 헤더 정보를 찾지 못했습니다.");

    setFilterMeta(`${describeCriteria(activeCriteria)} 엑셀 파일을 생성하고 있습니다.`);
    const worksheet = XLSX.utils.aoa_to_sheet([headers, ...values]);
    const samples = values.slice(0, 2000);
    worksheet["!cols"] = headers.map((header, index) => {
      const maxLength = Math.max(
        String(header).length,
        ...samples.map(row => String(row[index] ?? "").length)
      );
      return { wch: Math.min(Math.max(maxLength + 2, 10), 40) };
    });

    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "전체결과");
    XLSX.writeFile(workbook, makeFilteredDownloadFilename(activeCriteria));
    setFilterMeta(`${describeCriteria(activeCriteria)} 데이터 ${rows.length.toLocaleString("ko-KR")}건을 내려받았습니다.`);
  }catch(err){
    console.error("전체 결과 다운로드 오류:", err);
    setFilterMeta(`전체 결과 엑셀 다운로드 오류: ${err.message || err}`, true);
  }finally{
    downloadFilteredBtn.disabled = !(activeCriteria && activeTotalCount > 0);
    applyFilterBtn.disabled = false;
    searchBtn.disabled = false;
    downloadFilteredBtn.textContent = "전체 결과 엑셀 다운로드";
  }
}

// 조회 단계에서는 화면 표시 컬럼과 식별자만 가져옵니다.
// 원본 전체 행(raw_data)은 사용자가 복사/다운로드할 때 선택된 행만 별도로 조회합니다.
const SEARCH_SELECT_COLUMNS = ["id", "batch_id", ...DISPLAY_COLUMNS].join(",");

function clearSelection(){

  updateSelectionUI();
}

function setState(html, isError=false){
  currentRows = [];
  clearSelection();
  metaRow.style.display = "none";
  if(resultLimitNote) resultLimitNote.textContent = "";
  actionNotice.style.display = "none";

function renderTable(rows, totalCount=rows.length){
  if(!rows.length){
    setState("일치하는 주문이 없습니다.");
    return;
  }

  currentRows = rows;
  selectedRowIds.clear();
  const columns = DISPLAY_COLUMNS.length ? DISPLAY_COLUMNS : Object.keys(rows[0]);

  const thead = `<thead><tr>
    <th class="select-cell"><input type="checkbox" id="selectAllRows" aria-label="검색 결과 전체 선택" /></th>
    ${columns.map(c => `<th>${escapeHtml(LABELS[c] || c)}</th>`).join("")}
  </tr></thead>`;

  const tbody = `<tbody>${rows.map(row => {
    const rowId = String(row.id);
    return `<tr data-row-id="${escapeHtml(rowId)}">
      <td class="select-cell"><input type="checkbox" class="row-check" data-row-id="${escapeHtml(rowId)}" aria-label="이 행 선택" /></td>
      ${columns.map(c => `<td>${escapeHtml(row[c] ?? "")}</td>`).join("")}
    </tr>`;
  }).join("")}</tbody>`;

  resultArea.innerHTML = `<div class="table-scroll"><table>${thead}${tbody}</table></div>`;

  metaRow.style.display = "flex";
  resultCount.textContent = Number(totalCount || 0).toLocaleString("ko-KR");
  if(resultLimitNote){
    resultLimitNote.textContent = totalCount > rows.length
      ? ` (상위 ${rows.length.toLocaleString("ko-KR")}건 표시)`
      : "";
  }
  updateSelectionUI();
  bindSelectionEvents();
}

function bindSelectionEvents(){
  const selectAll = document.getElementById("selectAllRows");
  const rowChecks = [...document.querySelectorAll(".row-check")];

  selectAll?.addEventListener("change", () => {
    rowChecks.forEach(check => {
      check.checked = selectAll.checked;
      const rowId = check.dataset.rowId;
      if(selectAll.checked) selectedRowIds.add(rowId);
      else selectedRowIds.delete(rowId);
      check.closest("tr")?.classList.toggle("selected", selectAll.checked);
    });
    updateSelectionUI();
  });

  rowChecks.forEach(check => {
    check.addEventListener("change", () => {
      const rowId = check.dataset.rowId;
      if(check.checked) selectedRowIds.add(rowId);
      else selectedRowIds.delete(rowId);
      check.closest("tr")?.classList.toggle("selected", check.checked);
      updateSelectionUI();
    });
  });
}

function updateSelectionUI(){
  const count = selectedRowIds.size;
  selectedCount.textContent = count;
  copySelectedBtn.disabled = count === 0;
  downloadSelectedBtn.disabled = count === 0;

  const selectAll = document.getElementById("selectAllRows");
  if(selectAll && currentRows.length){
    selectAll.checked = count === currentRows.length;
    selectAll.indeterminate = count > 0 && count < currentRows.length;
  }
}

function escapeHtml(v){
  return String(v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function showNotice(message, isError=false){
  clearTimeout(noticeTimer);
  actionNotice.textContent = message;
  actionNotice.classList.toggle("error", isError);
  actionNotice.style.display = "block";
  noticeTimer = setTimeout(() => {
    actionNotice.style.display = "none";
  }, 4000);
}

function getSelectedSummaryRows(){
  return currentRows.filter(row => selectedRowIds.has(String(row.id)));
}

async function fetchSelectedOriginalRows(){
  const selected = getSelectedSummaryRows();
  if(!selected.length) throw new Error("선택된 행이 없습니다.");

  const ids = selected.map(row => row.id);
  const { data, error } = await supabaseClient
    .from(TABLE_NAME)
    .select("id,batch_id,raw_data")
    .in("id", ids);

  if(error) throw error;

  const originalById = new Map((data || []).map(row => [String(row.id), row]));
  const orderedRows = selected
    .map(row => originalById.get(String(row.id)))
    .filter(Boolean);

  if(orderedRows.length !== selected.length){
    throw new Error("일부 원본 행을 불러오지 못했습니다.");
  }

  return orderedRows;
}

async function fetchBatchInfo(rows){
  const batchIds = [...new Set(rows.map(row => row.batch_id).filter(v => v !== null && v !== undefined))];
  if(!batchIds.length) return new Map();

  const { data, error } = await supabaseClient
    .from(BATCH_TABLE_NAME)
    .select("id,headers,filename")
    .in("id", batchIds);

  if(error) throw error;
  return new Map((data || []).map(batch => [String(batch.id), batch]));
}

function normalizeHeaders(value){
  if(Array.isArray(value)) return value.map(String);
  if(typeof value === "string"){
    try{
      const parsed = JSON.parse(value);
      if(Array.isArray(parsed)) return parsed.map(String);
    }catch(_){ /* ignore */ }
  }
  return [];
}

function buildOriginalMatrix(rows, batchMap){
  const headers = [];
  const seen = new Set();

  rows.forEach(row => {
    const batchHeaders = normalizeHeaders(batchMap.get(String(row.batch_id))?.headers);
    const fallbackHeaders = Object.keys(row.raw_data || {});
    [...batchHeaders, ...fallbackHeaders].forEach(header => {
      if(!seen.has(header)){
        seen.add(header);
        headers.push(header);
      }
    });
  });

  const values = rows.map(row => headers.map(header => row.raw_data?.[header] ?? ""));
  return { headers, values };
}

function cleanClipboardCell(value){
  return String(value ?? "")
    .replace(/\t/g, " ")
    .replace(/\r?\n/g, " ");
}

async function writeClipboard(text){
  if(navigator.clipboard && window.isSecureContext){
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.opacity = "0";
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  const ok = document.execCommand("copy");
  textarea.remove();
  if(!ok) throw new Error("클립보드 복사 권한을 사용할 수 없습니다.");
}

async function copySelectedOriginalRows(){
  const count = selectedRowIds.size;
  if(!count) return;

  copySelectedBtn.disabled = true;
  downloadSelectedBtn.disabled = true;

  try{
    const rows = await fetchSelectedOriginalRows();
    const batchMap = await fetchBatchInfo(rows);
    const { values } = buildOriginalMatrix(rows, batchMap);
    const tsv = values.map(row => row.map(cleanClipboardCell).join("\t")).join("\n");

    await writeClipboard(tsv);
    showNotice(`${rows.length}개 원본 행 전체를 복사했습니다. 엑셀에서 붙여넣기 하세요.`);
  }catch(err){
    console.error(err);
    showNotice(`복사 중 오류가 발생했습니다: ${err.message || err}`, true);
  }finally{
    updateSelectionUI();
  }
}

function makeDownloadFilename(rows, batchMap){
  const filenames = [...new Set(rows
    .map(row => batchMap.get(String(row.batch_id))?.filename)
    .filter(Boolean))];

  const base = filenames.length === 1
    ? filenames[0].replace(/\.xlsx?$/i, "")
    : "주문조회";

  const now = new Date();
  const stamp = [
    now.getFullYear(),
    String(now.getMonth() + 1).padStart(2, "0"),
    String(now.getDate()).padStart(2, "0"),
    "_",
    String(now.getHours()).padStart(2, "0"),
    String(now.getMinutes()).padStart(2, "0"),
    String(now.getSeconds()).padStart(2, "0"),
  ].join("");

  return `${base}_선택행_${stamp}.xlsx`.replace(/[\\/:*?"<>|]/g, "_");
}

async function downloadSelectedOriginalRows(){
  const count = selectedRowIds.size;
  if(!count) return;

  copySelectedBtn.disabled = true;
  downloadSelectedBtn.disabled = true;

  try{
    const rows = await fetchSelectedOriginalRows();
    const batchMap = await fetchBatchInfo(rows);
    const { headers, values } = buildOriginalMatrix(rows, batchMap);

    const worksheet = XLSX.utils.aoa_to_sheet([headers, ...values]);
    worksheet["!cols"] = headers.map((header, index) => {
      const maxLength = Math.max(

        ...values.map(row => String(row[index] ?? "").length)
      );

  }catch(err){
    console.error(err);
    showNotice(`엑셀 내려받기 중 오류가 발생했습니다: ${err.message || err}`, true);
  }finally{
    updateSelectionUI();
  }
}

function escapeOrFilterValue(value){
  return String(value)
    .replace(/\\/g, "\\\\")
    .replace(/"/g, '\\"');
}

function makeIlikeFilter(column, value){
  const safeValue = escapeOrFilterValue(value);
  return `${column}.ilike."%${safeValue}%"`;
}

function buildPhoneSearchVariants(keyword){
  const looksLikePhone = /^[0-9\s()+.\-]+$/.test(keyword);
  const digits = keyword.replace(/\D/g, "");
  if(!looksLikePhone || digits.length < 7) return [];

  const variants = new Set([digits]);
  if(digits.startsWith("0") && digits.length >= 10){
    variants.add(digits.slice(1));
  }else if(digits.startsWith("1") && (digits.length === 9 || digits.length === 10)){
    variants.add(`0${digits}`);
  }

  const withLeadingZero = digits.startsWith("0") ? digits : `0${digits}`;
  if(withLeadingZero.length === 11 && withLeadingZero.startsWith("01")){
    variants.add(`${withLeadingZero.slice(0, 3)}-${withLeadingZero.slice(3, 7)}-${withLeadingZero.slice(7)}`);
  }else if(withLeadingZero.length === 10 && withLeadingZero.startsWith("01")){
    variants.add(`${withLeadingZero.slice(0, 3)}-${withLeadingZero.slice(3, 6)}-${withLeadingZero.slice(6)}`);
  }
  return [...variants].filter(Boolean);
}

function buildKeywordOrFilter(keyword){
  if(!keyword) return "";
  const filters = new Set(SEARCH_COLUMNS.map(col => makeIlikeFilter(col, keyword)));
  buildPhoneSearchVariants(keyword).forEach(variant => {
    PHONE_SEARCH_COLUMNS.forEach(col => filters.add(makeIlikeFilter(col, variant)));
  });
  return [...filters].join(",");
}

async function runSearch(){
  const criteria = getFilterCriteria(searchInput.value);
  if(!hasAnyCriteria(criteria)){
    setState("검색어를 입력하거나 상세 조건을 선택한 뒤 조회해 주세요.");
    setFilterMeta("검색어 또는 필터 조건을 하나 이상 선택해 주세요.", true);
    return;
  }

  searchBtn.disabled = true;
  applyFilterBtn.disabled = true;
  downloadFilteredBtn.disabled = true;
  setState("조회 중...");
  setFilterMeta(`${describeCriteria(criteria)} 조건으로 조회하고 있습니다.`);

  try{
    let query = supabaseClient
      .from(TABLE_NAME)
      .select(SEARCH_SELECT_COLUMNS, { count:"exact" })
      .order("id", { ascending:true })
      .limit(MAX_RESULTS);

    query = applyCriteriaToQuery(query, criteria);
    const { data, error, count } = await query;
    if(error) throw error;

    activeCriteria = { ...criteria };
    activeTotalCount = Number(count || 0);
    downloadFilteredBtn.disabled = activeTotalCount === 0;
    renderTable(data || [], activeTotalCount);
    setFilterMeta(
      activeTotalCount
        ? `${describeCriteria(criteria)} · 총 ${activeTotalCount.toLocaleString("ko-KR")}건`
        : `${describeCriteria(criteria)} 조건에 맞는 데이터가 없습니다.`
    );
  }catch(err){
    console.error(err);
    activeCriteria = null;
    activeTotalCount = 0;
    downloadFilteredBtn.disabled = true;
    setState(`조회 중 오류가 발생했습니다: ${escapeHtml(err.message || err)}`, true);
    setFilterMeta(`조회 중 오류가 발생했습니다: ${err.message || err}`, true);
  }finally{
    searchBtn.disabled = false;
    applyFilterBtn.disabled = false;
  }
}

copySelectedBtn.addEventListener("click", copySelectedOriginalRows);
downloadSelectedBtn.addEventListener("click", downloadSelectedOriginalRows);

searchBtn.addEventListener("click", runSearch);
searchInput.addEventListener("input", markCriteriaDirty);
searchInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter") runSearch();
});

// 체크된 행이 있을 때 Ctrl+C 또는 Cmd+C를 누르면 원본 전체 행을 복사합니다.
// 검색창/입력창을 사용 중이거나 화면에서 텍스트를 드래그 선택한 경우에는 기본 복사를 유지합니다.
document.addEventListener("keydown", (e) => {
  const isCopyShortcut = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "c";
  if(!isCopyShortcut || selectedRowIds.size === 0) return;

  const active = document.activeElement;
  const isEditing = active && (
    active.tagName === "INPUT" ||
    active.tagName === "TEXTAREA" ||
    active.isContentEditable
  );
  const hasTextSelection = Boolean(window.getSelection()?.toString());

  if(isEditing || hasTextSelection) return;

  e.preventDefault();
  copySelectedOriginalRows();
});

/* ---------------- 업로드 영역 (버튼으로 토글) ---------------- */
const toggleUploadBtn = document.getElementById("toggleUploadBtn");
const uploadPanel = document.getElementById("uploadPanel");
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const fileNameEl = document.getElementById("fileName");
const uploadBtn = document.getElementById("uploadBtn");
const replaceMode = document.getElementById("replaceMode");
const logEl = document.getElementById("log");
const progressWrap = document.getElementById("progressWrap");
const progressBar = document.getElementById("progressBar");
const uploadValidationError = document.getElementById("uploadValidationError");

let selectedFile = null;
let selectedFileBuffer = null;

toggleUploadBtn.addEventListener("click", () => {
  const isOpen = uploadPanel.style.display === "block";
  uploadPanel.style.display = isOpen ? "none" : "block";
  toggleUploadBtn.textContent = isOpen ? "데이터 업로드" : "업로드 닫기";
});

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files.length) setFile(fileInput.files[0]);
});

async function setFile(file){
  selectedFile = file;
  selectedFileBuffer = null;
  fileNameEl.textContent = `${file.name} · 읽는 중...`;
  uploadBtn.disabled = true;

  try{
    selectedFileBuffer = await file.arrayBuffer();
    fileNameEl.textContent = `${file.name} · ${(file.size / 1024 / 1024).toFixed(1)}MB`;
    uploadBtn.disabled = false;
  }catch(err){
    console.error("파일 읽기 오류:", err);
    selectedFile = null;
    selectedFileBuffer = null;
    fileNameEl.textContent = "파일을 읽지 못했습니다. 엑셀을 닫고 로컬 폴더에서 다시 선택해 주세요.";
    log(`❌ 파일 읽기 오류: ${err.message || err}`);
  }
}

function log(msg){
  logEl.style.display = "block";
  logEl.textContent += msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

function setProgress(pct){
  progressWrap.style.display = "block";
  progressBar.style.width = pct + "%";
}

function clearUploadValidationError(){
  uploadValidationError.style.display = "none";
  uploadValidationError.innerHTML = "";
}

function showUploadValidationError(title, message, rowListText = ""){
  const rowListHtml = rowListText
    ? `<div class="error-row-list">${escapeHtml(rowListText)}</div>`
    : "";
  uploadValidationError.innerHTML = `
    <h3>${escapeHtml(title)}</h3>
    <p>${escapeHtml(message).replace(/\n/g, '<br />')}</p>
    ${rowListHtml}
  `;
  uploadValidationError.style.display = "block";
}

uploadBtn.addEventListener("click", async () => {
  if (!selectedFile) return;
  uploadBtn.disabled = true;
  logEl.textContent = "";
  clearUploadValidationError();
  setProgress(0);

  try{
    log(`파일 읽는 중: ${selectedFile.name}`);
    if(!selectedFileBuffer) throw new Error("파일 데이터가 준비되지 않았습니다. 파일을 다시 선택해 주세요.");
    const wb = XLSX.read(selectedFileBuffer, { type: "array" });

    const sheetName = wb.SheetNames.includes(SHEET_NAME) ? SHEET_NAME : wb.SheetNames[0];
    log(`시트 사용: ${sheetName}`);
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

    if (!rows.length){
      log("데이터가 없습니다.");
      uploadBtn.disabled = false;
      return;
    }

    const headerRow = rows[0].map(h => (h === null ? "" : String(h).trim()));
    const dataRowEntries = rows
      .slice(1)
      .map((row, index) => ({ row, excelRow: index + 2 }))
      .filter(({ row }) => row.some(cell => cell !== null && cell !== ""));
    const dataRows = dataRowEntries.map(({ row }) => row);

    log(`총 ${dataRows.length}건의 데이터 확인됨`);

    // 검색/조회용으로 미리 알고 있는 컬럼만 별도 매핑 (모르는 열이어도 raw_data에는 전부 저장됨)
    const colMap = [];
    headerRow.forEach((h, i) => {
      colMap[i] = HEADER_MAP[h] || null;
    });

    // 출고일 열과 빈값을 DB 등록 전에 먼저 검사합니다.
    // 하나라도 비어 있으면 배치 생성/기존 데이터 삭제/주문 업로드를 전혀 진행하지 않습니다.
    const shippedDateIndex = colMap.findIndex(key => key === "shipped_date");

    if (shippedDateIndex === -1){
      const message = [
        "업로드를 중단했습니다.",
        "",
        "엑셀에서 '출고일' 열을 찾을 수 없습니다.",
        "출고일 열을 추가하거나 헤더명을 '출고일'로 맞춘 뒤 다시 업로드해 주세요."
      ].join("\n");
      alert(message);
      log("❌ 업로드 중단: '출고일' 열이 없습니다.");
      progressWrap.style.display = "none";
      return;
    }

    const blankShippedDateRows = dataRowEntries.filter(({ row }) => {
      const value = row[shippedDateIndex];
      return value === null || value === undefined || String(value).trim() === "";
    });

    if (blankShippedDateRows.length){
      const previewRows = blankShippedDateRows
        .slice(0, 15)
        .map(({ excelRow }) => `${excelRow}행`)
        .join(", ");
      const moreText = blankShippedDateRows.length > 15
        ? ` 외 ${blankShippedDateRows.length - 15}건`
        : "";
      const message = [
        "업로드를 중단했습니다.",
        "",
        `출고일이 비어 있는 행이 ${blankShippedDateRows.length.toLocaleString()}건 있습니다.`,
        "엑셀의 출고일을 모두 입력한 뒤 다시 업로드해 주세요.",
        "",
        `확인할 행: ${previewRows}${moreText}`,
        "",
        "현재 파일은 DB에 등록되지 않았습니다."
      ].join("\n");
      alert(message);
      log(`❌ 업로드 중단: 출고일 빈값 ${blankShippedDateRows.length.toLocaleString()}건`);
      log(`확인할 엑셀 행: ${previewRows}${moreText}`);
      progressWrap.style.display = "none";
      return;
    }

    log("✅ 출고일 빈값 검사 완료: 이상 없음");

    const unmapped = headerRow.filter((h, i) => h && !colMap[i]);
    if (unmapped.length){
      log(`ℹ 별도 컬럼 매핑은 없지만 원본 그대로 저장되는 열: ${unmapped.join(", ")}`);
    }

    // 1) 이번 업로드의 헤더 순서를 배치로 기록 (다운로드 시 원본 양식 복원용)
    const { data: batchData, error: batchErr } = await supabaseClient
      .from(BATCH_TABLE_NAME)
      .insert({
        filename: selectedFile.name,
        headers: headerRow.filter(h => h !== ""),
        row_count: dataRows.length,
      })
      .select()
      .single();
    if (batchErr) throw batchErr;
    const batchId = batchData.id;
    log(`배치 생성됨 (batch_id: ${batchId})`);

    // 2) 각 행: raw_data(모든 열 원본 그대로) + 검색용 매핑 컬럼을 함께 저장
    const records = dataRows.map(r => {
      const rec = { batch_id: batchId };
      const raw = {};

      headerRow.forEach((h, i) => {
        if (!h) return; // 헤더 없는 빈 열은 건너뜀
        let val = r[i];
        if (val === undefined) val = null;
        raw[h] = val === null ? null : String(val); // 원본 그대로 보존
      });
      rec.raw_data = raw;

      colMap.forEach((key, i) => {
        if (!key) return;
        let val = r[i];
        if (val === undefined) val = null;
        if (NUMERIC_KEYS.has(key)){
          const n = Number(val);
          val = (val === null || val === "" || isNaN(n)) ? null : n;
        } else if (val !== null) {
          val = String(val);
        }
        rec[key] = val;
      });

      return rec;
    });

    if (replaceMode.checked){
      log("기존 데이터 삭제 중...");
      const { error: delErr } = await supabaseClient.from(TABLE_NAME).delete().neq("batch_id", batchId);
      if (delErr) throw delErr;
      const { error: delBatchErr } = await supabaseClient.from(BATCH_TABLE_NAME).delete().neq("id", batchId);
      if (delBatchErr) throw delBatchErr;
      log("기존 데이터 삭제 완료");
    }

    log(`업로드 시작 (배치 크기: ${BATCH_SIZE})`);
    let uploaded = 0;
    for (let i = 0; i < records.length; i += BATCH_SIZE){
      const batch = records.slice(i, i + BATCH_SIZE);
      const { error } = await supabaseClient.from(TABLE_NAME).insert(batch);
      if (error) throw error;
      uploaded += batch.length;
      setProgress(Math.round((uploaded / records.length) * 100));
      log(`  ${uploaded} / ${records.length} 건 업로드 완료`);
    }

    log(`✅ 전체 업로드 완료: ${uploaded}건 (열 ${headerRow.filter(h=>h).length}개 전부 저장됨)`);
    await Promise.all([
      loadLatestUpload(),
      loadFilterOptions(),
    ]);
    selectedFile = null;
    selectedFileBuffer = null;
    fileInput.value = "";
    fileNameEl.textContent = "";
  }catch(err){
    console.error(err);
    log(`❌ 오류 발생: ${err.message || err}`);
  }finally{
    uploadBtn.disabled = false;
  }
});
</script>
