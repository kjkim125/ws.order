<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>주문 조회</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<style>
  :root{
    --ink:#1b2430;
    --ink-soft:#5b6674;
    --line:#e2e6eb;
    --bg:#f6f7f9;
    --panel:#ffffff;
    --accent:#2f5d50;
    --accent-soft:#eaf1ee;
    --danger:#b3452c;
    --radius:10px;
    font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding:32px 20px 80px;
  }
  .wrap{max-width:960px;margin:0 auto;}
  header{margin-bottom:28px;}
  header .eyebrow{
    font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:6px;
  }
  h1{font-size:26px;margin:0 0 4px;font-weight:800;}
  header p{margin:0;color:var(--ink-soft);font-size:14px;}

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:20px;
  }

  .search-row{display:flex;gap:10px;flex-wrap:wrap;}
  .search-row input[type="text"]{
    flex:1 1 260px;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:border-color .15s;
  }
  .search-row input[type="text"]:focus{border-color:var(--accent);}

  button{
    padding:12px 20px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:opacity .15s;
  }
  button:hover{opacity:.9;}
  button:disabled{opacity:.5;cursor:default;}
  button.ghost{
    background:transparent;
    color:var(--accent);
    border:1px solid var(--line);
  }

  .meta{
    display:flex;justify-content:space-between;align-items:center;
    margin:14px 0 8px;font-size:13px;color:var(--ink-soft);
  }
  .meta .count strong{color:var(--ink);}

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  thead th{
    background:var(--accent-soft);
    color:var(--accent);
    text-align:left;
    font-size:12px;
    letter-spacing:.03em;
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody td{
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    font-size:14px;
    vertical-align:top;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#fafbfc;}

  .state{
    padding:40px 20px;
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    background:var(--panel);
    border:1px dashed var(--line);
    border-radius:var(--radius);
  }
  .state.error{color:var(--danger);border-color:#e7c9bd;background:#fdf5f2;}

  .table-scroll{overflow-x:auto;}

  footer{margin-top:30px;font-size:12px;color:var(--ink-soft);text-align:center;}

  /* 업로드 패널 */
  #uploadPanel{display:none;}
  .drop{
    border:2px dashed var(--line); border-radius:var(--radius);
    padding:36px 20px; text-align:center; color:var(--ink-soft);
    transition:border-color .15s, background .15s; cursor:pointer;
  }
  .drop.dragover{border-color:var(--accent);background:var(--accent-soft);}
  .drop input{display:none;}
  .drop .filename{margin-top:10px;font-weight:600;color:var(--ink);}
  .options{display:flex;align-items:center;gap:8px;margin-top:16px;font-size:14px;color:var(--ink-soft);}
  .options input{width:16px;height:16px;}
  .actions{display:flex;gap:10px;margin-top:18px;}
  .log{
    margin-top:16px; background:#0f1a17; color:#c9e6da; font-size:13px;
    border-radius:8px; padding:14px; max-height:260px; overflow-y:auto;
    white-space:pre-wrap; font-family:"SFMono-Regular",Menlo,Consolas,monospace; display:none;
  }
  .progress{height:8px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:14px;display:none;}
  .progress .bar{height:100%;width:0%;background:var(--accent);transition:width .2s;}
</style>
</head>
<body>
<div class="wrap">
  <header style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;">
    <div>
      <div class="eyebrow">Internal Tool</div>
      <h1>주문 조회</h1>
      <p>검색어를 입력하면 일치하는 주문 데이터를 보여줍니다.</p>
    </div>
    <div id="userBar" style="display:flex;align-items:center;gap:10px;margin-top:4px;"></div>
  </header>

  <div class="panel">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="주문번호, 수령인, 운송장번호, 연락처로 검색" />
      <button id="searchBtn">조회</button>
      <button id="toggleUploadBtn" class="ghost" type="button">데이터 업로드</button>
    </div>
  </div>

  <!-- 업로드 패널 (버튼 클릭 시 노출) -->
  <div class="panel" id="uploadPanel">
    <h2 style="font-size:16px;margin:0 0 4px;">주문 데이터 업로드</h2>
    <p style="margin:0 0 16px;color:var(--ink-soft);font-size:13px;">발주서 형식의 엑셀 파일(.xlsx)을 업로드하면 DB에 저장됩니다.</p>

    <div class="drop" id="dropZone">
      <div>엑셀 파일(.xlsx)을 이곳에 드래그하거나 클릭해서 선택하세요</div>
      <div class="filename" id="fileName"></div>
      <input type="file" id="fileInput" accept=".xlsx,.xls" />
    </div>

    <div class="options">
      <input type="checkbox" id="replaceMode" />
      <label for="replaceMode">업로드 전 기존 데이터 전체 삭제 후 새로 등록 (전체 교체)</label>
    </div>

    <div class="actions">
      <button id="uploadBtn" disabled>업로드 시작</button>
    </div>

    <div class="progress" id="progressWrap"><div class="bar" id="progressBar"></div></div>
    <div class="log" id="log"></div>
  </div>

  <div id="metaRow" class="meta" style="display:none;">
    <div class="count">검색 결과 <strong id="resultCount">0</strong>건</div>
  </div>

  <div id="resultArea">
    <div class="state">검색어를 입력하고 조회 버튼을 눌러주세요.</div>
  </div>

  <footer>Powered by Supabase</footer>
</div>

<script>
/* =========================================================
   CONFIG — SUPABASE_URL / KEY는 config.js에서 관리합니다.
   ========================================================= */
const TABLE_NAME = "orders";
const BATCH_TABLE_NAME = "import_batches";

// 검색 대상은 정확히 7개 열만 사용합니다: B, C, E, G, H, Z, AA
const SEARCH_COLUMNS = [
  "order_no_sabangnet", // B: 주문번호(사방넷)
  "order_no_mall",      // C: 주문번호(쇼핑몰)
  "receiver_name",      // E: 수령인
  "tracking_no",        // G: 운송장번호
  "receiver_phone",     // H: 받는분연락처
  "orderer_phone1",     // Z: 주문자 연락처(1)
  "orderer_phone2",     // AA: 주문자 연락처(2)
];

// 결과 테이블 노출 열: A B C D E F G H L M N T V
const DISPLAY_COLUMNS = [
  "shipped_date",
  "order_no_sabangnet",
  "order_no_mall",
  "mall",
  "receiver_name",
  "courier",
  "tracking_no",
  "receiver_phone",
  "product_name",
  "quantity",
  "payment_amount",
  "product_color_code",
  "option_collected",
];

const LABELS = {
  shipped_date: "출고일",
  order_no_sabangnet: "주문번호(사방넷)",
  order_no_mall: "주문번호(쇼핑몰)",
  mall: "쇼핑몰",
  receiver_name: "수령인",
  courier: "택배사",
  tracking_no: "운송장번호",
  receiver_phone: "받는분연락처",
  product_name: "상품명",
  quantity: "수량",
  payment_amount: "결제금액",
  product_color_code: "상품컬러코드",
  option_collected: "옵션(수집)",
};

const HEADER_MAP = {
  "출고일": "shipped_date",
  "주문번호(사방넷)": "order_no_sabangnet",
  "주문번호(쇼핑몰)": "order_no_mall",
  "쇼핑몰": "mall",
  "수령인": "receiver_name",
  "택배사": "courier",
  "운송장번호": "tracking_no",
  "받는분연락처": "receiver_phone",
  "받는분기타연락처": "receiver_phone2",
  "주소": "address",
  "배송메세지": "delivery_message",
  "배송메시지": "delivery_message",
  "상품명": "product_name",
  "수량": "quantity",
  "결제금액": "payment_amount",
  "큐텐(한글상품명)": "product_name_qoo10",
  "바코드": "barcode",
  "큐텐바코드": "qoo10_barcode",
  "상품코드": "product_code",
  "모델NO": "model_no",
  "모델No": "model_no",
  "쇼핑몰(참고용)": "mall_ref",
  "상품컬러코드": "product_color_code",
  "상품명(수집)": "product_name_collected",
  "옵션(수집)": "option_collected",
  "주문자명": "orderer_name",
  "구분": "category",
  "주문일시": "order_datetime",
  "주문일시(YYYY-MM-DD HH:MM)": "order_datetime",
  "주문자 연락처(1)": "orderer_phone1",
  "주문자 연락처(2)": "orderer_phone2",
  "주문자전화번호1": "orderer_phone1",
  "주문자전화번호2": "orderer_phone2",
  "미출고": "not_shipped",
};

const NUMERIC_KEYS = new Set(["quantity", "payment_amount"]);
const REQUIRED_KEYS = [...new Set([...SEARCH_COLUMNS, ...DISPLAY_COLUMNS])];
const MAX_RESULTS = 200;
const SHEET_NAME = "발주서";
const BATCH_SIZE = 250;
/* ========================================================= */

(async () => {
  const session = await requireAuth();
  if (!session) return;
  renderUserBar(session, document.getElementById("userBar"));
})();

/* ---------------- 공통 함수 ---------------- */
function escapeHtml(value){
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function normalizeHeader(value){
  return String(value ?? "")
    .replace(/\u00a0/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function parseNumber(value){
  if (value === null || value === undefined || value === "") return null;
  const parsed = Number(String(value).replace(/,/g, "").trim());
  return Number.isFinite(parsed) ? parsed : null;
}

function formatBytes(bytes){
  if (!Number.isFinite(bytes)) return "";
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
}

/* ---------------- 검색 영역 ---------------- */
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const resultArea = document.getElementById("resultArea");
const metaRow = document.getElementById("metaRow");
const resultCount = document.getElementById("resultCount");

function setState(html, isError=false){
  metaRow.style.display = "none";
  resultArea.innerHTML = `<div class="state ${isError ? "error" : ""}">${html}</div>`;
}

function renderTable(rows){
  if (!rows.length){
    setState("일치하는 주문이 없습니다.");
    return;
  }

  const thead = `<thead><tr>${DISPLAY_COLUMNS
    .map(column => `<th>${escapeHtml(LABELS[column] || column)}</th>`)
    .join("")}</tr></thead>`;

  const tbody = `<tbody>${rows.map(row => `<tr>${DISPLAY_COLUMNS
    .map(column => `<td>${escapeHtml(row[column] ?? "")}</td>`)
    .join("")}</tr>`).join("")}</tbody>`;

  resultArea.innerHTML = `<div class="table-scroll"><table>${thead}${tbody}</table></div>`;
  metaRow.style.display = "flex";
  resultCount.textContent = rows.length;
}

function escapePostgrestFilterValue(value){
  return String(value).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
}

async function runSearch(){
  const keyword = searchInput.value.trim();
  if (!keyword){
    setState("검색어를 입력하고 조회 버튼을 눌러주세요.");
    return;
  }

  searchBtn.disabled = true;
  setState("조회 중...");

  try{
    const escapedKeyword = escapePostgrestFilterValue(keyword);
    const orFilter = SEARCH_COLUMNS
      .map(column => `${column}.ilike."%${escapedKeyword}%"`)
      .join(",");

    const { data, error } = await supabaseClient
      .from(TABLE_NAME)
      .select(DISPLAY_COLUMNS.join(","))
      .or(orFilter)
      .limit(MAX_RESULTS);

    if (error) throw error;
    renderTable(data || []);
  }catch(error){
    console.error(error);
    setState(`조회 중 오류가 발생했습니다: ${escapeHtml(error.message || error)}`, true);
  }finally{
    searchBtn.disabled = false;
  }
}

searchBtn.addEventListener("click", runSearch);
searchInput.addEventListener("keydown", event => {
  if (event.key === "Enter") runSearch();
});

/* ---------------- 업로드 영역 ---------------- */
const toggleUploadBtn = document.getElementById("toggleUploadBtn");
const uploadPanel = document.getElementById("uploadPanel");
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const fileNameEl = document.getElementById("fileName");
const uploadBtn = document.getElementById("uploadBtn");
const replaceMode = document.getElementById("replaceMode");
const logEl = document.getElementById("log");
const progressWrap = document.getElementById("progressWrap");
const progressBar = document.getElementById("progressBar");

let selectedFileInfo = null;
let selectedFileBuffer = null;

toggleUploadBtn.addEventListener("click", () => {
  const isOpen = uploadPanel.style.display === "block";
  uploadPanel.style.display = isOpen ? "none" : "block";
  toggleUploadBtn.textContent = isOpen ? "데이터 업로드" : "업로드 닫기";
});

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", event => {
  event.preventDefault();
  dropZone.classList.add("dragover");
});
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", event => {
  event.preventDefault();
  dropZone.classList.remove("dragover");
  const file = event.dataTransfer.files?.[0];
  if (file) void prepareFile(file);
});
fileInput.addEventListener("change", () => {
  const file = fileInput.files?.[0];
  if (file) void prepareFile(file);
});

async function prepareFile(file){
  selectedFileInfo = null;
  selectedFileBuffer = null;
  uploadBtn.disabled = true;
  fileNameEl.textContent = `${file.name} 파일 준비 중...`;
  logEl.textContent = "";
  logEl.style.display = "none";
  setProgress(0);
  progressWrap.style.display = "none";

  const extension = file.name.split(".").pop()?.toLowerCase();
  if (!['xlsx', 'xls'].includes(extension)){
    fileNameEl.textContent = "엑셀 파일(.xlsx, .xls)만 선택할 수 있습니다.";
    fileInput.value = "";
    return;
  }

  try{
    // 파일 선택 권한이 사라지는 문제를 막기 위해 선택 즉시 메모리로 읽습니다.
    const buffer = await file.arrayBuffer();
    selectedFileInfo = { name: file.name, size: file.size };
    selectedFileBuffer = buffer;
    fileNameEl.textContent = `${file.name} (${formatBytes(file.size)})`;
    uploadBtn.disabled = false;
  }catch(error){
    console.error(error);
    fileNameEl.textContent = "파일을 읽지 못했습니다. 엑셀을 닫고 로컬 폴더에 복사한 뒤 다시 선택해 주세요.";
    log(`❌ 파일 준비 오류: ${error.message || error}`);
  }finally{
    // 같은 파일도 다시 선택할 수 있도록 입력값을 비웁니다.
    fileInput.value = "";
  }
}

function log(message){
  logEl.style.display = "block";
  logEl.textContent += message + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

function setProgress(percent){
  progressWrap.style.display = "block";
  progressBar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
}

function findHeaderRowIndex(rows){
  const scanLimit = Math.min(rows.length, 30);
  for (let index = 0; index < scanLimit; index += 1){
    const headers = (rows[index] || []).map(normalizeHeader);
    const headerSet = new Set(headers);
    if (
      headerSet.has("주문번호(사방넷)") &&
      headerSet.has("주문번호(쇼핑몰)") &&
      headerSet.has("수령인")
    ){
      return index;
    }
  }
  return -1;
}

uploadBtn.addEventListener("click", async () => {
  if (!selectedFileInfo || !selectedFileBuffer) return;

  uploadBtn.disabled = true;
  logEl.textContent = "";
  setProgress(0);

  let batchId = null;

  try{
    log(`파일 분석 중: ${selectedFileInfo.name}`);
    const workbook = XLSX.read(selectedFileBuffer.slice(0), {
      type: "array",
      cellDates: true,
    });

    const sheetName = workbook.SheetNames.includes(SHEET_NAME)
      ? SHEET_NAME
      : workbook.SheetNames[0];

    if (!sheetName) throw new Error("엑셀 시트를 찾을 수 없습니다.");
    log(`시트 사용: ${sheetName}`);

    const worksheet = workbook.Sheets[sheetName];
    const allRows = XLSX.utils.sheet_to_json(worksheet, {
      header: 1,
      defval: null,
      raw: false,
      dateNF: "yyyy-mm-dd",
    });

    const headerRowIndex = findHeaderRowIndex(allRows);
    if (headerRowIndex < 0){
      throw new Error("발주서 헤더 행을 찾지 못했습니다. 주문번호(사방넷), 주문번호(쇼핑몰), 수령인 열을 확인해 주세요.");
    }

    const headerRow = (allRows[headerRowIndex] || []).map(normalizeHeader);
    const dataRows = allRows
      .slice(headerRowIndex + 1)
      .filter(row => row.some(cell => cell !== null && String(cell).trim() !== ""));

    if (!dataRows.length) throw new Error("업로드할 주문 데이터가 없습니다.");
    log(`총 ${dataRows.length}건의 데이터 확인됨`);

    const colMap = headerRow.map(header => HEADER_MAP[header] || null);
    const mappedKeys = new Set(colMap.filter(Boolean));
    const missingKeys = REQUIRED_KEYS.filter(key => !mappedKeys.has(key));

    if (missingKeys.length){
      const missingLabels = missingKeys.map(key => LABELS[key] || key);
      throw new Error(`필수 열이 누락되었습니다: ${missingLabels.join(", ")}`);
    }

    const unmappedHeaders = headerRow.filter((header, index) => header && !colMap[index]);
    if (unmappedHeaders.length){
      log(`ℹ 별도 DB 컬럼 없이 원본 데이터로만 저장되는 열: ${unmappedHeaders.join(", ")}`);
    }

    const records = dataRows.map(row => {
      const record = {};
      const rawData = {};

      headerRow.forEach((header, index) => {
        if (!header) return;
        const value = row[index] === undefined ? null : row[index];
        rawData[header] = value === null ? null : String(value);
      });
      record.raw_data = rawData;

      colMap.forEach((key, index) => {
        if (!key) return;
        const originalValue = row[index] === undefined ? null : row[index];
        record[key] = NUMERIC_KEYS.has(key)
          ? parseNumber(originalValue)
          : (originalValue === null ? null : String(originalValue).trim());
      });

      return record;
    });

    const { data: batchData, error: batchError } = await supabaseClient
      .from(BATCH_TABLE_NAME)
      .insert({
        filename: selectedFileInfo.name,
        headers: headerRow.filter(Boolean),
        row_count: dataRows.length,
      })
      .select("id")
      .single();

    if (batchError) throw batchError;
    batchId = batchData.id;
    records.forEach(record => { record.batch_id = batchId; });
    log(`업로드 배치 생성 완료`);

    log(`DB 업로드 시작 (한 번에 ${BATCH_SIZE}건)`);
    let uploaded = 0;

    for (let index = 0; index < records.length; index += BATCH_SIZE){
      const batch = records.slice(index, index + BATCH_SIZE);
      const { error } = await supabaseClient.from(TABLE_NAME).insert(batch);
      if (error) throw error;

      uploaded += batch.length;
      setProgress(Math.round((uploaded / records.length) * 100));
      log(`${uploaded} / ${records.length}건 업로드 완료`);
    }

    // 새 데이터가 정상적으로 모두 올라간 뒤에만 기존 데이터를 제거합니다.
    if (replaceMode.checked){
      log("기존 데이터 정리 중...");
      const { error: oldBatchError } = await supabaseClient
        .from(BATCH_TABLE_NAME)
        .delete()
        .neq("id", batchId);
      if (oldBatchError) throw oldBatchError;

      // 예전 스키마에서 배치 정보 없이 올라간 행도 정리합니다.
      const { error: legacyOrderError } = await supabaseClient
        .from(TABLE_NAME)
        .delete()
        .is("batch_id", null);
      if (legacyOrderError) throw legacyOrderError;
      log("기존 데이터 정리 완료");
    }

    setProgress(100);
    log(`✅ 전체 업로드 완료: ${records.length}건`);

    selectedFileInfo = null;
    selectedFileBuffer = null;
    fileNameEl.textContent = "";
  }catch(error){
    console.error(error);

    // 부분 업로드가 생기면 해당 배치를 삭제해 정리합니다.
    if (batchId !== null){
      const { error: cleanupError } = await supabaseClient
        .from(BATCH_TABLE_NAME)
        .delete()
        .eq("id", batchId);
      if (cleanupError) console.error("부분 업로드 정리 실패:", cleanupError);
    }

    log(`❌ 오류 발생: ${error.message || error}`);
  }finally{
    uploadBtn.disabled = !selectedFileInfo || !selectedFileBuffer;
  }
});
</script>
</body>
</html>
