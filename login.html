<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>주문 조회 로그인</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#1b2430; --ink-soft:#5b6674; --line:#e2e6eb;
    --bg:#f6f7f9; --panel:#ffffff; --accent:#2f5d50;
    --danger:#b3452c; --radius:10px;
    font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;min-height:100%;margin:0;}
  body{
    background:var(--bg);color:var(--ink);
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .card{
    width:100%;max-width:360px;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:32px 28px;
  }
  .eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px;}
  h1{font-size:22px;margin:0 0 22px;font-weight:800;}
  label{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
  input{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:15px;outline:none;margin-bottom:16px;transition:border-color .15s;
  }
  input:focus{border-color:var(--accent);}
  button{
    width:100%;padding:12px;border:none;border-radius:8px;
    background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  }
  button:disabled{opacity:.5;cursor:default;}
  .message{
    display:none;margin-bottom:14px;padding:10px 12px;font-size:13px;
    border:1px solid var(--line);border-radius:8px;
  }
  .message.error{display:block;background:#fdf5f2;color:var(--danger);border-color:#e7c9bd;}
  .message.info{display:block;background:#eaf1ee;color:var(--accent);border-color:#cdded7;}
  .secondary{margin-top:10px;background:transparent;color:var(--accent);border:1px solid var(--line);}
</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Internal Tool</div>
    <h1>주문 조회 로그인</h1>
    <div class="message" id="messageBox" role="alert"></div>

    <form id="loginForm">
      <label for="email">이메일</label>
      <input type="email" id="email" required autocomplete="username" />

      <label for="password">비밀번호</label>
      <input type="password" id="password" required autocomplete="current-password" />

      <button type="submit" id="loginBtn">로그인</button>
    </form>

    <button type="button" id="continueBtn" class="secondary" hidden>현재 로그인으로 주문 조회 열기</button>
  </main>

<script src="config.js"></script>
<script>
const form = document.getElementById("loginForm");
const messageBox = document.getElementById("messageBox");
const loginBtn = document.getElementById("loginBtn");
const continueBtn = document.getElementById("continueBtn");

function showMessage(message, type="error"){
  messageBox.textContent = message;
  messageBox.className = `message ${type}`;
}

// 자동 이동하지 않습니다. 기존 세션이 있으면 사용자가 직접 이동 버튼을 누르게 해
// login.html ↔ index.html 간 반복 이동을 방지합니다.
(async () => {
  try{
    const { data, error } = await supabaseClient.auth.getSession();
    if(error) throw error;

    if(data?.session){
      showMessage("이미 로그인되어 있습니다.", "info");
      continueBtn.hidden = false;
    }
  }catch(err){
    console.error("세션 확인 오류:", err);
  }
})();

continueBtn.addEventListener("click", () => {
  window.location.replace("index.html");
});

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  messageBox.className = "message";
  loginBtn.disabled = true;
  loginBtn.textContent = "로그인 중...";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try{
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if(error) throw error;
    if(!data?.session) throw new Error("로그인 세션을 생성하지 못했습니다.");

    window.location.replace("index.html");
  }catch(err){
    console.error("로그인 오류:", err);
    showMessage("이메일 또는 비밀번호가 올바르지 않거나 로그인을 완료하지 못했습니다.");
    loginBtn.disabled = false;
    loginBtn.textContent = "로그인";
  }
});
</script>
</body>
</html>
